<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .store-name {
    font-size: 60px;
    font-family: 'Roboto', sans-serif;
    text-transform: uppercase;
    position: relative;
    display: inline-block;
    animation: paint 3s ease-in-out forwards;
  }
  
  .store-name::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(to right, #e8c49f, #d29262);
    transform: scaleX(0);
    transform-origin: left;
    animation: paint-fill 3s ease-in-out forwards;
  }
  
  @keyframes paint {
    0% {
      opacity: 0;
      transform: translateY(-50px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  @keyframes paint-fill {
    0% {
      transform: scaleX(0);
    }
    100% {
      transform: scaleX(1);
    }
  }
  
</style>
<body>
    <h1 class="store-name"> Davi Casari </h1>
</body>
</html>
