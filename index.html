<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
  .store-name {
  opacity: 0;
}
.store-name {
  opacity: 0;
  animation: show-store-name 1s forwards;
}

@keyframes show-store-name {
  from {
    opacity: 0;
    transform: translateX(-50%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

</style>
<body>
    <h1 class="store-name"> Davi Casari </h1>
</body>
</html>
